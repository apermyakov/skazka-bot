services:
  skazka-bot:
    build: .
    container_name: skazka-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: skazka-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: skazka
      POSTGRES_PASSWORD: skazka
      POSTGRES_DB: skazka
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skazka"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: skazka-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - media_data:/usr/share/nginx/media:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
  media_data:
